<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTICLES AFM</title>
    <style>
        /* --- STYLE GLOBAL --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* --- CONTENEUR D'EN-TÊTE FIGÉ (Sticky) --- */
        .header-fixe {
            position: sticky;
            top: 0;
            background-color: white; /* Fond blanc opaque indispensable pour masquer les produits dessous */
            z-index: 100;            /* Reste au-dessus de tout le reste */
            padding-top: 5px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f4f7f6; /* Petite séparation esthétique */
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        /* --- BARRE DE RECHERCHE --- */
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #3498db;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2980b9;
        }

        .info-text {
            font-style: italic;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        /* --- TABLEAU DE RÉSULTATS --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        /* --- LIGNES DE TITRES FIGÉES JUSTE EN DESSOUS --- */
        th {
            background-color: #34495e;
            color: white;
            font-weight: 600;
            position: sticky;
            top: 185px;  /* S'aligne parfaitement après le bloc .header-fixe */
            z-index: 90;  /* Niveau de superposition légèrement inférieur au header principal */
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .no-result {
            text-align: center;
            padding: 20px;
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>

    // --- 2. SUPPRESSION DES ACCENTS ET CASSE ---
    function normaliserTexte(texte) {
        if (!texte) return "";
        return texte
            .toLowerCase()
            .normalize("NFD")             // Sépare les caractères de leurs accents
            .replace(/[\u0300-\u036f]/g, ""); // Supprime les blocs d'accents
    }

    // --- 3. LOGIQUE DE RECHERCHE ---
    function executerRecherche() {
        const saisie = document.getElementById("searchInput").value.trim();
        const tbody = document.getElementById("resultTableBody");
        const infoZone = document.getElementById("infoZone");
        
        tbody.innerHTML = ""; // Réinitialise l'affichage

        // Si le champ est vide, on affiche tout par défaut
        if (saisie === "") {
            afficherResultats(donneesProduits);
            infoZone.textContent = "Tous les produits sont affichés.";
            return;
        }

        // Normalisation de la saisie utilisateur
        let saisieNettoyee = normaliserTexte(saisie);

        // Traduction de l'étoile (*) en syntaxe d'expression régulière (Regex)
        let patternRegex = saisieNettoyee
            .replace(/[-\/\\^$+?.()|[\]{}]/g, '\\$&') 
            .replace(/\*/g, '.*');
        
        // Si l'utilisateur n'a écrit aucune étoile, on applique un comportement "contient" automatique
        if (!saisie.includes('*')) {
            patternRegex = '.*' + patternRegex + '.*';
        }

        // Création de l'expression régulière stricte
        const regex = new RegExp('^' + patternRegex + '$');

        // Filtrage global sur les trois colonnes
        const resultatsFiltres = donneesProduits.filter(produit => {
            const ref = normaliserTexte(produit.refcode);
            const code = normaliserTexte(produit.code);
            const desc = normaliserTexte(produit.desclong);

            return regex.test(ref) || regex.test(code) || regex.test(desc);
        });

        // Affichage des lignes trouvées
        if (resultatsFiltres.length > 0) {
            afficherResultats(resultatsFiltres);
            infoZone.textContent = `${resultatsFiltres.length} résultat(s) trouvé(s) pour "${saisie}".`;
        } else {
            tbody.innerHTML = `<tr><td colspan="3" class="no-result">Aucun résultat correspondant.</td></tr>`;
            infoZone.textContent = `0 résultat pour "${saisie}".`;
        }
    }

    // --- 4. INJECTION DU HTML ---
    function afficherResultats(liste) {
        const tbody = document.getElementById("resultTableBody");
        liste.forEach(produit => {
            const ligne = document.createElement("tr");
            ligne.innerHTML = `
                <td><strong>${produit.refcode}</strong></td>
                <td>${produit.code}</td>
                <td>${produit.desclong}</td>
            `;
            tbody.appendChild(ligne);
        });
    }

    // --- 5. ÉCOUTEURS D'ÉVÉNEMENTS ---
    document.getElementById("searchBtn").addEventListener("click", executerRecherche);
    
    // Lance la recherche également lors de l'appui sur la touche Entrée
    document.getElementById("searchInput").addEventListener("keyup", function(e) {
        if (e.key === "Enter") {
            executerRecherche();
        }
    });
